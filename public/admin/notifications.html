<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Notifications — EstateManager Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>tailwind.config={theme:{extend:{colors:{"primary":"#00361a","surface":"#f8fafb","surface-container-lowest":"#fff","surface-container-low":"#f2f4f5","surface-container":"#eceeef","surface-container-high":"#e6e8e9","outline-variant":"#c1c9bf","on-surface":"#191c1d","on-surface-variant":"#414942"}}}}</script>
<style>body{font-family:'Hanken Grotesk',sans-serif;background:#f8fafb}.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}.spin{animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}</style>
</head>
<body class="text-on-surface">
<div class="flex h-screen overflow-hidden">
<aside class="fixed md:static inset-y-0 left-0 w-64 bg-white border-r border-outline-variant flex flex-col py-6 px-4 z-50 transform -translate-x-full md:translate-x-0 transition-transform" id="sidebar">
  <div class="mb-8 px-2"><h1 class="text-xl font-bold text-primary">EstateManager</h1><p class="text-xs text-on-surface-variant">Admin Panel</p></div>
  <nav class="flex-1 space-y-1">
    <a href="/admin/dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined">dashboard</span>Dashboard</a>
    <a href="/admin/tenants.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined">group</span>Tenants</a>
    <a href="/admin/properties.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined">domain</span>Properties</a>
    <a href="/admin/bills.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined">receipt_long</span>Financials</a>
    <a href="/admin/complaints.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined">support_agent</span>Complaints</a>
    <a href="/admin/maintenance.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined">handyman</span>Maintenance</a>
    <a href="/admin/access.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined">key</span>Access Control</a>
  </nav>
  <div class="border-t border-outline-variant pt-4"><div class="flex items-center gap-3 px-2"><div id="sidebarAvatar" class="w-9 h-9 rounded-full bg-primary flex items-center justify-center text-white text-sm font-bold">A</div><div><p id="sidebarName" class="text-sm font-bold">Admin</p><p class="text-xs text-on-surface-variant">Administrator</p></div></div><button onclick="Auth.logout()" class="mt-3 w-full flex items-center gap-2 px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg transition-colors"><span class="material-symbols-outlined text-base">logout</span>Logout</button></div>
</aside>
<div class="flex-1 flex flex-col min-w-0 overflow-hidden">
  <header class="flex items-center justify-between h-14 px-4 md:px-6 bg-white border-b border-outline-variant shrink-0">
    <div class="flex items-center gap-3"><button onclick="document.getElementById('sidebar').classList.toggle('-translate-x-full')" class="md:hidden p-1.5 rounded-lg"><span class="material-symbols-outlined">menu</span></button><h2 class="font-semibold">Notifications</h2></div>
    <div class="flex gap-2">
      <button onclick="markAllRead()" class="text-xs text-primary font-semibold hover:underline px-2">Mark all read</button>
      <button onclick="openModal('broadcastModal')" class="flex items-center gap-1.5 px-3 py-1.5 bg-primary text-white rounded-lg text-sm font-semibold hover:brightness-110"><span class="material-symbols-outlined text-base">campaign</span>Broadcast</button>
    </div>
  </header>
  <main class="flex-1 overflow-y-auto">
    <div id="notifList" class="divide-y divide-outline-variant">
      <div class="flex justify-center py-16"><span class="material-symbols-outlined spin text-2xl text-on-surface-variant">refresh</span></div>
    </div>
  </main>
</div>
</div>

<!-- Broadcast Modal -->
<div id="broadcastModal" class="hidden fixed inset-0 bg-black/40 z-50 items-center justify-center p-4">
  <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl">
    <div class="flex items-center justify-between p-5 border-b border-outline-variant"><h3 class="font-bold text-lg">Broadcast Notification</h3><button onclick="closeModal('broadcastModal')" class="p-1.5 hover:bg-surface-container rounded-lg"><span class="material-symbols-outlined">close</span></button></div>
    <form id="broadcastForm" class="p-5 space-y-3">
      <div><label class="text-xs font-semibold text-on-surface-variant">Title *</label><input name="title" required class="w-full mt-1 px-3 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary"/></div>
      <div><label class="text-xs font-semibold text-on-surface-variant">Message *</label><textarea name="message" required rows="3" class="w-full mt-1 px-3 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary resize-none"></textarea></div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-xs font-semibold text-on-surface-variant">Type</label><select name="type" class="w-full mt-1 px-3 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary"><option value="info">Info</option><option value="warning">Warning</option><option value="success">Success</option><option value="error">Error</option></select></div>
        <div><label class="text-xs font-semibold text-on-surface-variant">Send To</label><select name="role" class="w-full mt-1 px-3 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary"><option value="tenant">All Tenants</option><option value="all">Everyone</option></select></div>
      </div>
      <div class="flex gap-3 pt-2"><button type="button" onclick="closeModal('broadcastModal')" class="flex-1 py-2 border border-outline-variant rounded-lg text-sm">Cancel</button><button type="submit" class="flex-1 py-2 bg-primary text-white rounded-lg text-sm font-semibold">Send Broadcast</button></div>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
const user = Auth.requireAuth('admin');
if(user){document.getElementById('sidebarName').textContent=user.name;document.getElementById('sidebarAvatar').textContent=user.name[0];}
function openModal(id){document.getElementById(id).classList.remove('hidden');document.getElementById(id).classList.add('flex');}
function closeModal(id){document.getElementById(id).classList.add('hidden');document.getElementById(id).classList.remove('flex');}

const typeConfig = {
  success:{icon:'check_circle',bg:'bg-green-50',icon_color:'text-green-600',dot:'bg-green-500'},
  error:{icon:'error',bg:'bg-red-50',icon_color:'text-red-600',dot:'bg-red-500'},
  warning:{icon:'warning',bg:'bg-yellow-50',icon_color:'text-yellow-600',dot:'bg-yellow-500'},
  payment:{icon:'payments',bg:'bg-blue-50',icon_color:'text-blue-600',dot:'bg-blue-500'},
  maintenance:{icon:'handyman',bg:'bg-orange-50',icon_color:'text-orange-600',dot:'bg-orange-500'},
  info:{icon:'info',bg:'bg-gray-50',icon_color:'text-gray-600',dot:'bg-gray-400'},
};

async function loadNotifications(){
  try{
    const notifs = await api.get('/notifications');
    if(!(notifs||[]).length){ document.getElementById('notifList').innerHTML='<div class="flex flex-col items-center py-24 gap-3"><span class="material-symbols-outlined text-5xl text-on-surface-variant/20" style="font-variation-settings:\'FILL\' 1">notifications_off</span><p class="text-sm text-on-surface-variant">No notifications</p></div>'; return; }
    document.getElementById('notifList').innerHTML = notifs.map(n=>{
      const cfg=typeConfig[n.type]||typeConfig.info;
      return `<div onclick="markRead('${n.id}',this)" class="flex items-start gap-4 px-5 py-4 cursor-pointer hover:bg-surface-container-low transition-colors ${!n.is_read?'bg-green-50/40':''}">
        <div class="relative shrink-0 mt-0.5">
          <div class="w-10 h-10 rounded-full ${cfg.bg} flex items-center justify-center"><span class="material-symbols-outlined ${cfg.icon_color}" style="font-variation-settings:'FILL' 1">${cfg.icon}</span></div>
          ${!n.is_read?`<span class="absolute -top-0.5 -right-0.5 w-3 h-3 ${cfg.dot} rounded-full border-2 border-white"></span>`:''}
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-start justify-between gap-2"><p class="text-sm font-semibold ${!n.is_read?'text-on-surface':'text-on-surface-variant'}">${n.title}</p><span class="text-xs text-on-surface-variant shrink-0">${fmt.ago(n.created_at)}</span></div>
          <p class="text-sm text-on-surface-variant mt-0.5">${n.message}</p>
        </div>
      </div>`;
    }).join('');
  }catch(e){ console.error(e); }
}

async function markRead(id,el){
  if(el.classList.contains('bg-green-50/40')){ el.classList.remove('bg-green-50/40'); el.querySelector('.absolute')?.remove(); await api.put(`/notifications/${id}/read`,{}).catch(()=>{}); }
}
async function markAllRead(){ try{ await api.put('/notifications/read-all',{}); toast('All marked as read'); loadNotifications(); }catch(e){ toast(e.message,'error'); } }

document.getElementById('broadcastForm').addEventListener('submit',async e=>{
  e.preventDefault(); const fd=new FormData(e.target); const data={}; fd.forEach((v,k)=>data[k]=v);
  const btn=e.target.querySelector('[type=submit]'); btn.disabled=true;
  try{ const r=await api.post('/notifications/broadcast',data); toast(r.message||'Broadcast sent!'); closeModal('broadcastModal'); e.target.reset(); loadNotifications(); }
  catch(err){ toast(err.message,'error'); }finally{ btn.disabled=false; }
});
loadNotifications();
</script>
</body></html>

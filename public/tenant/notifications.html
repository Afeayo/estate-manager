<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Notifications — EstateManager</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>tailwind.config={theme:{extend:{colors:{"primary":"#00361a","surface":"#f8fafb","surface-container-lowest":"#fff","surface-container-low":"#f2f4f5","surface-container":"#eceeef","surface-container-high":"#e6e8e9","outline-variant":"#c1c9bf","on-surface":"#191c1d","on-surface-variant":"#414942"}}}}</script>
<style>body{font-family:'Hanken Grotesk',sans-serif;background:#f8fafb}.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}.spin{animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}</style>
</head>
<body class="text-on-surface pb-20 md:pb-0">
<div class="flex h-screen overflow-hidden">
<aside class="hidden md:flex flex-col w-64 bg-white border-r border-outline-variant py-6 px-4 shrink-0">
  <div class="mb-8 px-2"><h1 class="text-xl font-bold text-primary">EstateManager</h1><p class="text-xs text-on-surface-variant">Tenant Portal</p></div>
  <nav class="flex-1 space-y-1">
    <a href="/tenant/dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined">home</span>Home</a>
    <a href="/tenant/bills.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined">receipt_long</span>Bills & Payments</a>
    <a href="/tenant/support.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined">support_agent</span>Support & Complaints</a>
    <a href="/tenant/access.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined">key</span>Access & Visitors</a>
    <a href="/tenant/notifications.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-primary font-semibold bg-green-50 border-r-4 border-primary"><span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">notifications</span>Notifications</a>
  </nav>
  <div class="border-t border-outline-variant pt-4"><div class="flex items-center gap-3 px-2"><div id="sidebarAvatar" class="w-9 h-9 rounded-full bg-primary flex items-center justify-center text-white text-sm font-bold">T</div><div><p id="sidebarName" class="text-sm font-bold">Tenant</p><p class="text-xs text-on-surface-variant">Resident</p></div></div><button onclick="Auth.logout()" class="mt-3 w-full flex items-center gap-2 px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg transition-colors"><span class="material-symbols-outlined text-base">logout</span>Logout</button></div>
</aside>
<div class="flex-1 flex flex-col min-w-0 overflow-hidden">
  <header class="flex items-center justify-between h-14 px-4 md:px-6 bg-white border-b border-outline-variant shrink-0">
    <div class="flex items-center gap-3"><a href="/tenant/dashboard.html" class="md:hidden p-1.5 rounded-lg hover:bg-surface-container"><span class="material-symbols-outlined">arrow_back</span></a><h2 class="font-semibold">Notifications</h2></div>
    <button id="markAllBtn" onclick="markAllRead()" class="text-xs text-primary font-semibold hover:underline px-2 py-1">Mark all read</button>
  </header>
  <main class="flex-1 overflow-y-auto">
    <div id="notifList" class="divide-y divide-outline-variant">
      <div class="flex justify-center py-16"><span class="material-symbols-outlined spin text-2xl text-on-surface-variant">refresh</span></div>
    </div>
  </main>
</div>
</div>
<nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-outline-variant flex items-center z-50">
  <a href="/tenant/dashboard.html" class="flex-1 flex flex-col items-center py-3 text-on-surface-variant"><span class="material-symbols-outlined text-xl">home</span><span class="text-xs mt-0.5">Home</span></a>
  <a href="/tenant/bills.html" class="flex-1 flex flex-col items-center py-3 text-on-surface-variant"><span class="material-symbols-outlined text-xl">receipt_long</span><span class="text-xs mt-0.5">Bills</span></a>
  <a href="/tenant/support.html" class="flex-1 flex flex-col items-center py-3 text-on-surface-variant"><span class="material-symbols-outlined text-xl">support_agent</span><span class="text-xs mt-0.5">Support</span></a>
  <a href="/tenant/access.html" class="flex-1 flex flex-col items-center py-3 text-on-surface-variant"><span class="material-symbols-outlined text-xl">key</span><span class="text-xs mt-0.5">Access</span></a>
  <a href="/tenant/notifications.html" class="flex-1 flex flex-col items-center py-3 text-primary"><span class="material-symbols-outlined text-xl" style="font-variation-settings:'FILL' 1">notifications</span><span class="text-xs font-semibold mt-0.5">Alerts</span></a>
</nav>
<script src="/js/api.js"></script>
<script>
const user = Auth.requireAuth('tenant');
if(user){document.getElementById('sidebarName').textContent=user.name;document.getElementById('sidebarAvatar').textContent=user.name[0];}

const typeConfig = {
  success:  { icon:'check_circle',   bg:'bg-green-50',  icon_color:'text-green-600',  dot:'bg-green-500'  },
  error:    { icon:'error',          bg:'bg-red-50',    icon_color:'text-red-600',    dot:'bg-red-500'    },
  warning:  { icon:'warning',        bg:'bg-yellow-50', icon_color:'text-yellow-600', dot:'bg-yellow-500' },
  payment:  { icon:'payments',       bg:'bg-blue-50',   icon_color:'text-blue-600',   dot:'bg-blue-500'   },
  maintenance:{ icon:'handyman',     bg:'bg-orange-50', icon_color:'text-orange-600', dot:'bg-orange-500' },
  info:     { icon:'info',           bg:'bg-gray-50',   icon_color:'text-gray-600',   dot:'bg-gray-400'   },
};

async function loadNotifications(){
  try{
    const notifs = await api.get('/notifications');
    const list = document.getElementById('notifList');
    if(!(notifs||[]).length){
      list.innerHTML=`<div class="flex flex-col items-center py-24 gap-3"><span class="material-symbols-outlined text-5xl text-on-surface-variant/20" style="font-variation-settings:'FILL' 1">notifications_off</span><p class="text-sm text-on-surface-variant">You're all caught up!</p></div>`;
      return;
    }
    list.innerHTML = notifs.map(n => {
      const cfg = typeConfig[n.type] || typeConfig.info;
      return `<div onclick="markRead('${n.id}',this)" class="flex items-start gap-4 px-5 py-4 cursor-pointer hover:bg-surface-container-low transition-colors ${!n.is_read?'bg-green-50/40':''}">
        <div class="relative shrink-0 mt-0.5">
          <div class="w-10 h-10 rounded-full ${cfg.bg} flex items-center justify-center">
            <span class="material-symbols-outlined ${cfg.icon_color}" style="font-variation-settings:'FILL' 1">${cfg.icon}</span>
          </div>
          ${!n.is_read?`<span class="absolute -top-0.5 -right-0.5 w-3 h-3 ${cfg.dot} rounded-full border-2 border-white"></span>`:''}
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-start justify-between gap-2">
            <p class="text-sm font-semibold ${!n.is_read?'text-on-surface':'text-on-surface-variant'}">${n.title}</p>
            <span class="text-xs text-on-surface-variant shrink-0">${fmt.ago(n.created_at)}</span>
          </div>
          <p class="text-sm text-on-surface-variant mt-0.5 leading-relaxed">${n.message}</p>
        </div>
      </div>`;
    }).join('');
  }catch(e){ console.error(e); }
}

async function markRead(id, el){
  if(el.classList.contains('bg-green-50/40')){
    el.classList.remove('bg-green-50/40');
    el.querySelector('.absolute')?.remove();
    await api.put(`/notifications/${id}/read`,{}).catch(()=>{});
  }
}

async function markAllRead(){
  try{ await api.put('/notifications/read-all',{}); toast('All marked as read'); loadNotifications(); }
  catch(e){ toast(e.message,'error'); }
}

loadNotifications();
</script>
</body></html>

<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Application Status — EstateManager</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>tailwind.config={theme:{extend:{colors:{"primary":"#00361a","surface":"#f8fafb","surface-container-low":"#f2f4f5","surface-container":"#eceeef","outline-variant":"#c1c9bf","on-surface":"#191c1d","on-surface-variant":"#414942"}}}}</script>
<style>body{font-family:'Hanken Grotesk',sans-serif;background:#f8fafb}.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}.spin{animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}.pulse{animation:pulse 2s ease-in-out infinite}</style>
</head>
<body class="min-h-screen flex flex-col">
<div class="bg-primary text-white px-5 py-4 flex items-center justify-between">
  <div><h1 class="text-lg font-bold">EstateManager</h1><p class="text-green-200 text-xs">Application Portal</p></div>
  <button onclick="Auth.logout()" class="text-green-200 text-sm hover:text-white flex items-center gap-1"><span class="material-symbols-outlined text-base">logout</span>Logout</button>
</div>

<div class="flex-1 flex items-center justify-center p-5">
  <div class="w-full max-w-lg" id="mainContent">
    <div class="flex justify-center py-12"><span class="material-symbols-outlined spin text-3xl text-on-surface-variant">refresh</span></div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
const user = Auth.requireAuth('tenant');

const statusConfig = {
  pending: {
    icon: 'hourglass_top', color: 'text-yellow-600', bg: 'bg-yellow-50', border: 'border-yellow-200',
    title: 'Application Under Review',
    msg: 'Your KYC application has been received and is currently being reviewed by our team. This typically takes 1-3 business days.',
    badge: 'bg-yellow-100 text-yellow-700', badgeText: 'Pending Review'
  },
  under_review: {
    icon: 'manage_search', color: 'text-blue-600', bg: 'bg-blue-50', border: 'border-blue-200',
    title: 'Active Review in Progress',
    msg: 'Our team is actively reviewing your application and documents. You will be notified as soon as a decision is made.',
    badge: 'bg-blue-100 text-blue-700', badgeText: 'Under Review'
  },
  approved: {
    icon: 'check_circle', color: 'text-green-600', bg: 'bg-green-50', border: 'border-green-200',
    title: '🎉 Application Approved!',
    msg: 'Congratulations! Your KYC has been approved. Please complete your security deposit and first month\'s rent to finalize your tenancy.',
    badge: 'bg-green-100 text-green-700', badgeText: 'Approved'
  },
  rejected: {
    icon: 'cancel', color: 'text-red-600', bg: 'bg-red-50', border: 'border-red-200',
    title: 'Application Requires Attention',
    msg: 'Your application could not be approved at this time. Please review the notes from our team and resubmit.',
    badge: 'bg-red-100 text-red-700', badgeText: 'Rejected'
  }
};

async function loadStatus() {
  try {
    const app = await api.get('/kyc/my-application');

    if (!app) {
      // No application yet — redirect to onboarding
      document.getElementById('mainContent').innerHTML = `
        <div class="text-center">
          <div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-5">
            <span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings:'FILL' 1">apartment</span>
          </div>
          <h2 class="text-2xl font-bold mb-2">Welcome!</h2>
          <p class="text-on-surface-variant mb-6">You haven't applied for a unit yet. Browse available apartments and start your application.</p>
          <a href="/tenant/onboarding.html" class="inline-flex items-center gap-2 px-6 py-3 bg-primary text-white rounded-xl font-bold hover:brightness-110 transition-all shadow-lg">
            <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">search_home</span>Browse Available Units
          </a>
        </div>`;
      return;
    }

    const cfg = statusConfig[app.status] || statusConfig.pending;

    // If active, redirect to full dashboard
    if (app.status === 'approved') {
      const me = await api.get('/auth/me');
      if (me.onboarding_status === 'active') {
        window.location.href = '/tenant/dashboard.html';
        return;
      }
    }

    document.getElementById('mainContent').innerHTML = `
      <!-- Status Card -->
      <div class="bg-white rounded-2xl border ${cfg.border} shadow-sm overflow-hidden mb-5">
        <div class="${cfg.bg} px-6 py-8 text-center border-b ${cfg.border}">
          <div class="w-20 h-20 rounded-full bg-white flex items-center justify-center mx-auto mb-4 shadow-sm ${app.status === 'pending' || app.status === 'under_review' ? 'pulse' : ''}">
            <span class="material-symbols-outlined ${cfg.color} text-4xl" style="font-variation-settings:'FILL' 1">${cfg.icon}</span>
          </div>
          <h2 class="text-xl font-bold mb-1">${cfg.title}</h2>
          <p class="text-on-surface-variant text-sm">${cfg.msg}</p>
          <span class="inline-block mt-3 px-3 py-1 rounded-full text-xs font-bold ${cfg.badge}">${cfg.badgeText}</span>
        </div>
        <div class="p-5 space-y-3">
          <div class="flex justify-between text-sm"><span class="text-on-surface-variant">Unit Applied For</span><span class="font-semibold">Unit ${app.unit_number} (${app.block || ''})</span></div>
          <div class="flex justify-between text-sm"><span class="text-on-surface-variant">Monthly Rent</span><span class="font-semibold">${fmt.money(app.rent_amount)}</span></div>
          <div class="flex justify-between text-sm"><span class="text-on-surface-variant">Submitted</span><span class="font-semibold">${fmt.date(app.submitted_at)}</span></div>
          ${app.reviewed_at ? `<div class="flex justify-between text-sm"><span class="text-on-surface-variant">Reviewed</span><span class="font-semibold">${fmt.date(app.reviewed_at)}</span></div>` : ''}
          ${app.admin_notes ? `<div class="bg-surface-container-low rounded-xl p-3"><p class="text-xs font-semibold text-on-surface-variant mb-1">Note from Management</p><p class="text-sm">${app.admin_notes}</p></div>` : ''}
        </div>
      </div>

      ${app.status === 'approved' ? `
      <!-- Payment Required -->
      <div class="bg-white rounded-2xl border border-green-200 shadow-sm p-5 mb-5">
        <h3 class="font-bold mb-4 flex items-center gap-2"><span class="material-symbols-outlined text-primary" style="font-variation-settings:'FILL' 1">payments</span>Complete Your Payment</h3>
        <div id="paymentBills" class="space-y-3">
          <div class="flex justify-center py-4"><span class="material-symbols-outlined spin text-on-surface-variant">refresh</span></div>
        </div>
      </div>` : ''}

      ${app.status === 'rejected' ? `
      <div class="text-center">
        <a href="/tenant/onboarding.html" class="inline-flex items-center gap-2 px-6 py-3 bg-primary text-white rounded-xl font-bold hover:brightness-110 transition-all">
          <span class="material-symbols-outlined">refresh</span>Resubmit Application
        </a>
      </div>` : ''}

      <!-- Timeline -->
      <div class="bg-white rounded-2xl border border-outline-variant p-5">
        <h3 class="font-bold mb-4 text-sm">Application Journey</h3>
        <div class="space-y-3">
          ${[
            { label: 'Application Submitted', done: true, date: app.submitted_at },
            { label: 'Documents Received', done: ['under_review','approved','rejected'].includes(app.status) },
            { label: 'Under Admin Review', done: ['under_review','approved','rejected'].includes(app.status) },
            { label: 'KYC Decision', done: ['approved','rejected'].includes(app.status), status: app.status === 'approved' ? 'Approved ✓' : app.status === 'rejected' ? 'Rejected' : null },
            { label: 'Payment & Activation', done: app.status === 'approved' && app.payments_complete },
          ].map(step => `
            <div class="flex items-center gap-3">
              <div class="w-6 h-6 rounded-full flex items-center justify-center shrink-0 ${step.done ? 'bg-green-500' : 'bg-gray-200'}">
                <span class="material-symbols-outlined text-xs text-white" style="font-variation-settings:'FILL' 1">${step.done ? 'check' : 'circle'}</span>
              </div>
              <div class="flex-1">
                <p class="text-sm font-medium ${step.done ? '' : 'text-on-surface-variant'}">${step.label}</p>
                ${step.date ? `<p class="text-xs text-on-surface-variant">${fmt.date(step.date)}</p>` : ''}
                ${step.status ? `<p class="text-xs font-semibold ${step.status.includes('Approved') ? 'text-green-600' : 'text-red-600'}">${step.status}</p>` : ''}
              </div>
            </div>`).join('')}
        </div>
      </div>`;

    // Load payment bills if approved
    if (app.status === 'approved') {
      loadPaymentBills();
    }

  } catch (e) { document.getElementById('mainContent').innerHTML = `<p class="text-center text-red-500">${e.message}</p>`; }
}

async function loadPaymentBills() {
  try {
    const d = await api.get('/bills?status=pending&limit=10');
    const bills = (d.bills || []).filter(b => ['deposit','rent'].includes(b.category));
    const container = document.getElementById('paymentBills');
    if (!container) return;

    if (!bills.length) {
      container.innerHTML = '<p class="text-xs text-center text-green-600 font-semibold py-2">✓ All payments received — awaiting final activation</p>';
      return;
    }

    container.innerHTML = bills.map(b => `
      <div class="flex items-center justify-between p-3 bg-surface-container-low rounded-xl border border-outline-variant">
        <div>
          <p class="text-sm font-semibold">${b.title}</p>
          <p class="text-xs text-on-surface-variant capitalize">${b.category} · Due ${fmt.date(b.due_date)}</p>
        </div>
        <div class="text-right">
          <p class="font-bold">${fmt.money(b.amount)}</p>
          <button onclick="payBill('${b.id}', ${b.amount})" class="mt-1 px-3 py-1 bg-primary text-white rounded-lg text-xs font-semibold hover:brightness-110">Pay Now</button>
        </div>
      </div>`).join('');
  } catch (e) {}
}

async function payBill(billId, amount) {
  try {
    const r = await api.post('/payments/initialize', { bill_id: billId });
    if (r.demo) { toast(r.message, 'success'); setTimeout(() => loadStatus(), 1500); return; }
    if (r.authorization_url) { window.location.href = r.authorization_url; }
  } catch (e) { toast(e.message, 'error'); }
}

// Check if returning from Paystack
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('payment') === 'success' || urlParams.get('trxref')) {
  const ref = urlParams.get('trxref') || urlParams.get('reference');
  if (ref) {
    api.get(`/payments/verify/${ref}`).then(r => {
      toast(r.verified ? 'Payment confirmed!' : 'Payment pending verification', r.verified ? 'success' : 'warning');
    }).catch(() => {});
  }
}

loadStatus();
setInterval(loadStatus, 30000); // auto-refresh every 30s
</script>
</body></html>
